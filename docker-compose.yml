services:
  postgres:
    image: postgres:17
    container_name: appointment-tool-postgres
    environment:
      POSTGRES_USER: appointment
      POSTGRES_PASSWORD: appointment
      POSTGRES_DB: appointment_tool
    ports:
      - "5433:5432"
    volumes:
      - appointment_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointment -d appointment_tool"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional local reminder poller (app must be running on host :3080).
  # Set REMINDER_CRON_SECRET in .env to match the app.
  reminder-cron:
    profiles: ["reminders"]
    image: curlimages/curl:8.12.1
    container_name: appointment-tool-reminder-cron
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "reminder-cron: polling every 3m"
        while true; do
          curl -fsS -X POST \
            -H "Authorization: Bearer $${REMINDER_CRON_SECRET}" \
            "http://host.docker.internal:3080/api/reminders/process" \
            || echo "reminder-cron: request failed"
          sleep 180
        done
    restart: unless-stopped

volumes:
  appointment_pg_data:
